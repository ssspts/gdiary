<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDiary - Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<!-- Navbar -->
<nav class="navbar">
    <div class="logo">GDiary</div>
    <div id="userSection">
        <button id="logoutBtn">Logout</button>
    </div>
</nav>

<div class="main-container">
    <!-- Left sidebar -->
    <aside class="sidebar">
        <input type="date" id="datePicker" />
        <ul id="datesList"></ul>
    </aside>

    <!-- Sub-sidebar for files -->
    <aside class="file-sidebar">
        <h4>Files</h4>
        <ul id="filesList"></ul>
        <button id="addFileBtn">+ New File</button>
    </aside>

    <!-- Main editor -->
    <main class="editor-container">
        <div class="editor-header">
            <h2 id="fileTitle">Untitled</h2>
            <div class="editor-actions">
                <button id="saveBtn">Save</button>
                <button id="draftBtn">Save Draft</button>
            </div>
        </div>
        <textarea id="editor" placeholder="Write your note here..."></textarea>
    </main>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
